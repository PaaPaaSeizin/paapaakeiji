<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaaPaaKeiji V1.3 - Evolution!!! -</title>
    <style>
        /* 全体の基本デザイン */
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #4A76D4; /* 背景の青 */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ヘッダー・ナビゲーション */
        header {
            width: 100%;
            padding: 20px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { opacity: 0.7; text-decoration: underline; }

        /* メインタイトル */
        .title-section {
            text-align: center;
            margin: 40px 0;
        }

        .title-section h1 {
            font-size: clamp(32px, 8vw, 48px); /* レスポンシブ対応 */
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        /* ★「今日は何の日」埋め込みボックス ★ */
        .anniversary-container {
            width: 90%;
            max-width: 400px;
            background-color: #C2D1F0; /* ウィジェットの薄い青 */
            border-radius: 12px;
            margin-bottom: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            overflow: hidden; /* iframeのはみ出し防止 */
            border: 2px solid rgba(255,255,255,0.3);
        }

        /* ウィジェット用のiframe */
        .anniversary-frame {
            width: 100%;
            height: 150px; /* 中身のHTMLに合わせて調整してくれ */
            border: none;
            display: block;
        }

        /* 掲示板（GAS）埋め込みエリア */
        .board-container {
            width: 95%;
            max-width: 1000px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            margin-bottom: 50px;
        }

        .board-frame {
            width: 100%;
            height: 1000px; /* 掲示板の高さ */
            border: none;
            display: block;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PaaPaaKeiji</div>
        <nav>
            <a href="index.html">掲示板トップ</a>
            <a href="#">スマホ版</a>
            <a href="#">お問い合わせ</a>
            <a href="#">Q&A</a>
        </nav>
    </header>

    <div class="title-section">
        <h1>Gemini製 掲示板<br>PaaPaaKeiji V1.3</h1>
        <p>Evolution!!! Update</p>
    </div>

    <div class="anniversary-container">
        <iframe 
            src="anniversary.html" 
            class="anniversary-frame"
            scrolling="no">
        </iframe>
    </div>

    <div class="board-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbxW13-vlQ_YtkjKSUKFYjORmwi8ZIS7kK05cCZw5ehcG9ToR-fdAu_U2N-S-5n-dVTO/exec" 
            class="board-frame"
            allow="clipboard-write">
        </iframe>
    </div>

    <footer>
        &copy; 2026 PaaPaaKeiji Evolution!!!
    </footer>

</body>
</html>
