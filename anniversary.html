  function updateWidget() {
    const now = new Date();
    const todayStr = (now.getMonth() + 1) + "/" + now.getDate();
    const lines = rawDataText.split('\n');
    
    let event = "特に何の日でもありません";
    for (const line of lines) {
      if (line.startsWith(todayStr + ",")) {
        event = line.substring(line.indexOf(",") + 1);
        break;
      }
    }
    
    document.getElementById('today-date').innerText = todayStr;
    document.getElementById('today-event').innerText = event;
  }
